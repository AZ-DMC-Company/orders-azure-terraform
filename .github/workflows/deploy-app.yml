name: Deploy application infrastructure

on:
  workflow_dispatch:

jobs:

  terraform:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd infrastructure
          terraform init
        env:
          ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}

      - name: Terraform Validate
        run: |
          cd infrastructure
          terraform force-unlock -force 162e8bc6-e2e1-41da-af26-d5dc217ec5e4
          terraform validate

      - name: Terraform Apply
        run: |
          cd infrastructure
          terraform apply \
          -var="frontend_image=${{ secrets.FRONTEND_IMAGE_NAME }}:dev" \
          -var="backend_image=${{ secrets.BACKEND_IMAGE_NAME }}:dev" \
          -var="prometheus_image=${{ secrets.PROMETHEUS_IMAGE_NAME }}:dev" \
          -var="mysql_url=${{ secrets.MYSQL_URL }}" \
          -var="mysql_user=${{ secrets.MYSQL_USER }}" \
          -var="mysql_password=${{ secrets.MYSQL_PASSWORD }}" \
          -var="grafana_user=${{ secrets.GRAFANA_USER }}" \
          -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
          -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
          -auto-approve
        env:
          ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}