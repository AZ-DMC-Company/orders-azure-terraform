name: Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Selecciona la acción a ejecutar'
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply

jobs:
  infrastructure:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - run: terraform init

      - name: List Container App Environments
        run: az containerapp env list -o table

      - name: Terraform Action
        run: |
          if [ "${{ github.event.inputs.action }}" = "destroy" ]; then
            echo "🚨 Destruyendo Infraestructura Principal..."
            terraform destroy -auto-approve
          else
            echo "🛠 Aplicando Infraestructura Principal..."
            terraform plan -out=tfplan \
              -var="backend_image=${{ secrets.BACKEND_IMAGE }}" \
              -var="frontend_image=${{ secrets.FRONTEND_IMAGE }}"
            terraform apply -auto-approve tfplan